# ============================================================================
# MaybeTomorrow.store — Nginx vhost
# ----------------------------------------------------------------------------
# Upstream: Next.js 16 (standalone) running under PM2 as `mt-store` on
#           127.0.0.1:3003.
# Domain:   maybetomorrow.store + wildcard subdomains (*.maybetomorrow.store).
# TLS:      Let's Encrypt wildcard (requires DNS-01 challenge, e.g. via the
#           certbot-dns-ionos plugin; see deploy/README.md for details).
# ----------------------------------------------------------------------------
# Install:
#   sudo cp deploy/nginx-maybetomorrow.conf \
#           /etc/nginx/sites-available/maybetomorrow
#   sudo ln -s /etc/nginx/sites-available/maybetomorrow \
#              /etc/nginx/sites-enabled/maybetomorrow
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ----------------------------------------------------------------------------
# Upstream pool — single Node.js process managed by PM2.
# ----------------------------------------------------------------------------
upstream mt_store_upstream {
    server 127.0.0.1:3003;
    keepalive 32;
}

# ----------------------------------------------------------------------------
# HTTP → HTTPS redirect
# Catches apex + every subdomain (wildcard) on port 80.
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name maybetomorrow.store *.maybetomorrow.store;

    # Allow ACME http-01 challenges (used as a fallback if/when we switch
    # away from DNS-01). Everything else hard-redirects to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------------
# HTTPS vhost — apex + wildcard subdomains.
# ----------------------------------------------------------------------------
server {
    # nginx 1.24 (Ubuntu 24.04) still uses the legacy `http2` flag on the
    # `listen` line. On nginx >= 1.25 you would instead write `listen 443 ssl;`
    # plus a separate `http2 on;` directive.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maybetomorrow.store *.maybetomorrow.store;

    # ------------------------------------------------------------------------
    # TLS — Let's Encrypt wildcard certificate.
    # The wildcard cert must be issued via DNS-01 (http-01 does not support
    # *.maybetomorrow.store). See deploy/README.md for certbot-dns-ionos.
    # ------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/maybetomorrow.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maybetomorrow.store/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:MT_STORE_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ------------------------------------------------------------------------
    # Uploads limit — coach images, product photos, etc.
    # ------------------------------------------------------------------------
    client_max_body_size 20M;

    # ------------------------------------------------------------------------
    # Security headers (baseline — tighten per-route if needed).
    # ------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ------------------------------------------------------------------------
    # Gzip compression — cheap wins for HTML/CSS/JS/JSON.
    # (brotli is left off; enable via ngx_brotli if the module is installed.)
    # ------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.api+json
        image/svg+xml
        font/ttf
        font/otf;

    # ------------------------------------------------------------------------
    # Static uploads — served directly by Nginx from a persistent host path,
    # bypassing Next.js. This is where user-uploaded files land (see
    # UPLOAD_DIR in .env).
    # ------------------------------------------------------------------------
    location /uploads/ {
        alias /var/mt-store/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # Next.js build assets — hashed filenames, safe to cache aggressively.
    # ------------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://mt_store_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 365d;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ------------------------------------------------------------------------
    # Next.js image optimizer — cacheable but shorter TTL.
    # ------------------------------------------------------------------------
    location /_next/image {
        proxy_pass http://mt_store_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ------------------------------------------------------------------------
    # Main proxy — everything else goes to Next.js.
    # Subdomains (shoezaa.maybetomorrow.store, bakery.maybetomorrow.store, …)
    # land here with the original Host header, so the Next.js middleware
    # can resolve the tenant from the subdomain.
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://mt_store_upstream;
        proxy_http_version 1.1;

        # Standard forwarding headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Keep-alive pool to upstream.
        proxy_set_header Connection "";

        # Websocket / streaming support (Next.js HMR, server actions, RSC).
        proxy_set_header Upgrade           $http_upgrade;

        # Generous timeouts for AI calls and long server actions.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Do not buffer streamed responses (React Server Components, SSE).
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ------------------------------------------------------------------------
    # Logs — per-site, rotated by logrotate.
    # ------------------------------------------------------------------------
    access_log /var/log/nginx/maybetomorrow-access.log;
    error_log  /var/log/nginx/maybetomorrow-error.log;
}

# ============================================================================
# Mahelya Platform sibling — mahelya.maybetomorrow.store -> 127.0.0.1:3000
# ----------------------------------------------------------------------------
# Runs as a completely independent Next.js sibling on port 3000 (PHIbel's
# existing dashboard or any replacement). Nginx prefers exact server_name
# matches over wildcards, so this block takes precedence over the
# *.maybetomorrow.store vhost above — no path rewrites needed.
# The Let's Encrypt wildcard cert for *.maybetomorrow.store covers this
# hostname as well.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name mahelya.maybetomorrow.store;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mahelya.maybetomorrow.store;

    # Reuse the wildcard certificate issued for *.maybetomorrow.store.
    ssl_certificate     /etc/letsencrypt/live/maybetomorrow.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maybetomorrow.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    access_log /var/log/nginx/mahelya-access.log;
    error_log  /var/log/nginx/mahelya-error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}
